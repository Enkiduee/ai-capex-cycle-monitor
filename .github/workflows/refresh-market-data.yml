name: Refresh A-share and US market quotes

on:
  schedule:
    - cron: '7,37 9-11,13-14 * * 1-5'
      timezone: 'Asia/Shanghai'
    - cron: '17 15 * * 1-5'
      timezone: 'Asia/Shanghai'
    - cron: '7,37 9-15 * * 1-5'
      timezone: 'America/New_York'
    - cron: '17 16 * * 1-5'
      timezone: 'America/New_York'
  workflow_dispatch:
    inputs:
      market:
        description: Market to refresh
        required: true
        default: all
        type: choice
        options:
          - all
          - cn
          - us
          - auto
      dry_run:
        description: Fetch and validate without committing changes
        required: true
        default: false
        type: boolean

permissions: {}

concurrency:
  group: data-refresh-main
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.publish.outputs.changed }}
      commit_sha: ${{ steps.publish.outputs.commit_sha }}
      markets: ${{ steps.quotes.outputs.markets }}
      updated_tickers: ${{ steps.quotes.outputs.updated_tickers }}
    steps:
      - name: Check out main with history
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Validate current site and data
        run: |
          node scripts/validate-site.mjs
          node scripts/validate-data.mjs
          node scripts/test-market-quotes.mjs

      - name: Refresh market quote snapshot
        id: quotes
        env:
          MARKET: ${{ github.event_name == 'workflow_dispatch' && inputs.market || 'auto' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
          IS_MANUAL: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          args=(--market "$MARKET")
          if [ "$DRY_RUN" = "true" ]; then
            args+=(--dry-run)
          fi
          if [ "$IS_MANUAL" = "true" ]; then
            args+=(--force)
          fi
          node scripts/refresh-market-quotes.mjs "${args[@]}"

      - name: Validate refreshed data
        run: |
          node scripts/validate-data.mjs
          node scripts/validate-site.mjs
          node scripts/test-market-quotes.mjs

      - name: Commit and push changed quotes
        id: publish
        env:
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Dry run complete; no files will be committed."
            exit 0
          fi

          git add -- data/market-quotes.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No new quote timestamps detected."
            exit 0
          fi

          git config user.name "ai-capex-market-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(data): refresh market quotes"
          pushed=false
          for attempt in 1 2 3; do
            if ! git fetch origin main; then
              echo "Fetch attempt $attempt failed; retrying." >&2
              sleep $((attempt * 2))
              continue
            fi
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "Market data conflicts with a newer main commit; refusing to overwrite it." >&2
              exit 1
            fi
            if git push origin HEAD:main; then
              pushed=true
              break
            fi
            sleep $((attempt * 2))
          done
          if [ "$pushed" != "true" ]; then
            echo "Unable to push market data after 3 attempts." >&2
            exit 1
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Write run summary
        if: always()
        env:
          CHANGED: ${{ steps.publish.outputs.changed }}
          MARKETS: ${{ steps.quotes.outputs.markets }}
          UPDATED_TICKERS: ${{ steps.quotes.outputs.updated_tickers }}
        run: |
          {
            echo "## Market quote refresh"
            echo "- Markets: \`${MARKETS:-none}\`"
            echo "- Updated tickers: \`${UPDATED_TICKERS:-none}\`"
            echo "- Data changed: \`${CHANGED:-false}\`"
            echo "- A shares: every 30 minutes during the session + 15:17 Asia/Shanghai"
            echo "- US shares: every 30 minutes during the core session + 16:17 America/New_York"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    needs: refresh
    if: needs.refresh.outputs.changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out latest main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Validate latest main before deployment
        run: |
          node scripts/validate-site.mjs
          node scripts/validate-data.mjs
          node scripts/test-sec-monitor.mjs
          node scripts/test-market-quotes.mjs

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

      - name: Deploy refreshed data to Pages
        id: deployment
        uses: actions/deploy-pages@v5
